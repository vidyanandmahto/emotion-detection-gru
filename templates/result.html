<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result · EmotionLens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="bg-orbs">
  <span class="orb orb-1"></span>
  <span class="orb orb-2"></span>
  <span class="orb orb-3"></span>
</div>

<nav class="navbar">
  <div class="nav-inner">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="brand-mark">◈</span> EmotionLens
    </a>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Detect</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</nav>

<main class="container">
  <header class="hero">
    <p class="eyebrow">Result</p>
    <h1>Here's what the model heard</h1>
  </header>

  <section class="card result-card" style="display:flex; flex-direction:column; gap:24px;">
    <div class="result-top">
      <div class="result-emoji" style="background:{{ color }}22;">{{ emoji }}</div>
      <div>
        <p class="result-kicker">Predicted emotion</p>
        <h2 style="color:{{ color }};">{{ emotion|capitalize }}</h2>
      </div>
    </div>
    <p><strong>Sentence:</strong> "{{ sentence }}"</p>
    <p><strong>Confidence:</strong> {{ confidence }}%</p>

    <a href="{{ url_for('index') }}" class="btn btn-primary" style="text-decoration:none; text-align:center;">Try another sentence</a>
  </section>
</main>

<footer class="site-footer">
  <p>Built with TensorFlow, Flask &amp; a lot of coffee — © 2026 EmotionLens</p>
</footer>

</body>
</html>
